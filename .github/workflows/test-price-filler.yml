name: Test Crypto Price Filler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run strict CLI parse check (fail fast)
        run: npm run test:strict

      - name: Run full Vitest suite + coverage
        run: npm run test

      - name: Upload coverage report (optional but recommended)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}  # optional — add if you use Codecov
          fail_ci_if_error: true
          