name: CI - Lint, Tests & Strict Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: fetch-from-centralized-exchange/crypto-price-filler/package-lock.json

      - name: Install dependencies
        working-directory: fetch-from-centralized-exchange/crypto-price-filler
        run: npm ci

      - name: Run ESLint (complexity max 17)
        working-directory: fetch-from-centralized-exchange/crypto-price-filler
        run: npm run lint

      - name: Run strict CLI parse/validation + full Vitest suite (fail fast)
        working-directory: fetch-from-centralized-exchange/crypto-price-filler
        run: npm run test:strict

      # Optional: Upload coverage report (uncomment when you have Codecov token)
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
