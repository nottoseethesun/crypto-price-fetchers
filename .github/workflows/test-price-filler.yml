name: CI - Tests & Strict Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: fetch-from-centralized-exchange/crypto-price-filler/package-lock.json  # ← THIS LINE FIXES IT

      - name: Install dependencies
        working-directory: fetch-from-centralized-exchange/crypto-price-filler
        run: npm ci

      - name: Run strict CLI parse/validation check (fail fast)
        working-directory: fetch-from-centralized-exchange/crypto-price-filler
        run: npm run test:strict

      - name: Run full Vitest test suite + coverage
        working-directory: fetch-from-centralized-exchange/crypto-price-filler
        run: npm run test

      # Optional coverage upload
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v5
